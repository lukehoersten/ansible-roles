unifi_protect_viewport_poe_fan: true
unifi_protect_viewport_poe_fan_temp0: 60000
unifi_protect_viewport_poe_fan_temp1: 70000
unifi_protect_viewport_poe_fan_temp2: 80000
unifi_protect_viewport_poe_fan_temp3: 85000

# vault_unifi_protect_viewport_protect_username: — required, set in host_vars
# vault_unifi_protect_viewport_protect_password: — required, set in host_vars
